<template>
    <div class="slds-var-p-around_small">

        <!-- ── Frequency ──────────────────────────────────────────────────────── -->
        <div class={frequencySectionClass}>
            <h3 class="slds-section__title">
                <button
                    type="button"
                    class="slds-button slds-section__title-action"
                    aria-expanded={frequencyOpen}
                    onclick={handleToggleFrequency}
                >
                    <lightning-icon
                        icon-name={frequencyChevronName}
                        size="x-small"
                        class="slds-button__icon slds-button__icon_left"
                        aria-hidden="true"
                    ></lightning-icon>
                    <span class="slds-truncate" title="Frequency">Frequency</span>
                </button>
            </h3>
            <div class="slds-section__content slds-var-p-top_x-small">
                <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">
                    Choose which giving frequencies donors can pick. At least one is required.
                </p>

                <div class="slds-form-element">
                    <div class="slds-form-element__control">
                        <label class="slds-checkbox_toggle slds-grid slds-grid_vertical-align-center">
                            <input type="checkbox" checked={showOneTime} onchange={handleShowOneTimeChange} />
                            <span class="slds-checkbox_faux_container">
                                <span class="slds-checkbox_faux"></span>
                            </span>
                            <span class="slds-form-element__label slds-m-bottom_none slds-p-left_small">One-time</span>
                        </label>
                    </div>
                </div>

                <div class="slds-form-element slds-var-m-top_x-small">
                    <div class="slds-form-element__control">
                        <label class="slds-checkbox_toggle slds-grid slds-grid_vertical-align-center">
                            <input type="checkbox" checked={showMonthly} onchange={handleShowMonthlyChange} />
                            <span class="slds-checkbox_faux_container">
                                <span class="slds-checkbox_faux"></span>
                            </span>
                            <span class="slds-form-element__label slds-m-bottom_none slds-p-left_small">Monthly</span>
                        </label>
                    </div>
                </div>

                <template lwc:if={frequencyError}>
                    <p class="slds-form-error slds-var-m-top_x-small" role="alert">{frequencyError}</p>
                </template>

                <template lwc:if={showDefaultFrequency}>
                    <div class="slds-var-m-top_small">
                        <lightning-combobox
                            label="Default frequency"
                            value={defaultFrequency}
                            options={frequencyOptions}
                            onchange={handleDefaultFrequencyChange}
                        ></lightning-combobox>
                    </div>
                </template>
            </div>
        </div>

        <hr class="slds-var-m-vertical_x-small" />

        <!-- ── Preset Amounts ──────────────────────────────────────────────────── -->
        <div class="slds-section slds-is-open">
            <h3 class="slds-section__title">
                <span class="slds-truncate slds-var-p-horizontal_small" title="Preset amounts">Preset amounts</span>
            </h3>
            <div class="slds-section__content slds-var-p-top_x-small">

                <template lwc:if={showOneTime}>
                    <template lwc:if={showBothFrequencies}>
                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_x-small">One-time</p>
                    </template>
                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                        <template for:each={presetsOneTime} for:item="preset">
                            <div key={preset.key} class="slds-col slds-size_1-of-3 slds-var-m-bottom_x-small">
                                <div class="amount-input-group">
                                    <span class="amount-symbol">{presetCurrencySymbol}</span>
                                    <input
                                        type="number"
                                        class="amount-input"
                                        aria-label={preset.label}
                                        placeholder="0"
                                        value={preset.amount}
                                        min="0"
                                        step="any"
                                        data-index={preset.index}
                                        oninput={handlePresetOTAmountChange}
                                    />
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template lwc:if={showMonthly}>
                    <template lwc:if={showBothFrequencies}>
                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_x-small">Monthly</p>
                    </template>
                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                        <template for:each={presetsRecurring} for:item="preset">
                            <div key={preset.key} class="slds-col slds-size_1-of-3 slds-var-m-bottom_x-small">
                                <div class="amount-input-group">
                                    <span class="amount-symbol">{presetCurrencySymbol}</span>
                                    <input
                                        type="number"
                                        class="amount-input"
                                        aria-label={preset.label}
                                        placeholder="0"
                                        value={preset.amount}
                                        min="0"
                                        step="any"
                                        data-index={preset.index}
                                        oninput={handlePresetRecAmountChange}
                                    />
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

            </div>
        </div>

        <hr class="slds-var-m-vertical_x-small" />

        <!-- ── Other Amount ────────────────────────────────────────────────────── -->
        <div class="slds-section slds-is-open">
            <h3 class="slds-section__title">
                <span class="slds-truncate slds-var-p-horizontal_small" title="Other amount">Other amount</span>
            </h3>
            <div class="slds-section__content slds-var-p-top_x-small">
                <div class="slds-grid slds-gutters_small">
                    <div class="slds-col slds-size_1-of-2">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="min-amount-input">Minimum</label>
                            <div class="amount-input-group">
                                <span class="amount-symbol">{presetCurrencySymbol}</span>
                                <input
                                    type="number"
                                    id="min-amount-input"
                                    class="amount-input"
                                    aria-label="Minimum amount"
                                    value={minAmount}
                                    min="0"
                                    step="1"
                                    oninput={handleMinAmountChange}
                                />
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="max-amount-input">Maximum</label>
                            <div class="amount-input-group">
                                <span class="amount-symbol">{presetCurrencySymbol}</span>
                                <input
                                    type="number"
                                    id="max-amount-input"
                                    class="amount-input"
                                    aria-label="Maximum amount"
                                    placeholder="No limit"
                                    value={maxAmount}
                                    min="0"
                                    step="1"
                                    oninput={handleMaxAmountChange}
                                />
                            </div>
                        </div>
                    </div>
                </div>
                <template lwc:if={minMaxError}>
                    <p class="slds-form-error slds-var-m-top_x-small" role="alert">{minMaxError}</p>
                </template>
            </div>
        </div>

    </div>
</template>
